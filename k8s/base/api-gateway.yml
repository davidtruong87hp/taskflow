# ─── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: backend
    spec:
      containers:
        - name: api-gateway
          image: taskflow/api-gateway
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: api-gateway-config
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ─── ConfigMap ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  PORT: '4000'
  NODE_ENV: 'production'
  # These URLs use Kubernetes's internal DNS — the service name resolves
  # to the ClusterIP of each service automatically.
  # This is the magic of Kubernetes service discovery.
  TASK_SERVICE_URL: 'http://task-service:4001'
  USER_SERVICE_URL: 'http://user-service:4002'
  SERVICE_NAME: 'api-gateway' # (use appropriate name per service)
  OTEL_SERVICE_NAME: 'api-gateway'
  OTEL_EXPORTER_OTLP_ENDPOINT: 'http://grafana.monitoring.svc.cluster.local:4318'
  OTEL_EXPORTER_OTLP_PROTOCOL: 'http/protobuf'
  # This tells the auto-instrumentation which libraries to instrument.
  # http captures all inbound/outbound HTTP calls — the most important one
  # for seeing inter-service traces. nestjs-core adds NestJS-specific spans.
  OTEL_NODE_ENABLED_INSTRUMENTATIONS: 'http,express,nestjs-core'
  # This is the critical line — it tells Node.js to load the
  # auto-instrumentation module before running any application code.
  # Without this, all the OTEL_* variables above have no effect.
  NODE_OPTIONS: '--require @opentelemetry/auto-instrumentations-node/register'

---
# ─── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
