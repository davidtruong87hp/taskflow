# This file tells Kustomize which resources belong to the base.
# Running "kubectl apply -k k8s/base" will apply all three files.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - api-gateway.yml
  - task-service.yml
  - user-service.yml
  - ingress.yml
  - postgres/secret.yaml
  - postgres/postgres.yaml
  - postgres/user-service-secret.yaml
  - postgres/task-service-secret.yaml
  - redis/secret.yaml
  - redis/redis.yaml
  - redis/api-gateway-secret.yaml
