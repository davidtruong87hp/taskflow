apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-ingress
  annotations:
    # Tell NGINX to rewrite paths before forwarding — important if your
    # services expect requests at "/" rather than "/api" etc.
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx # Tells K8s which controller should handle this
  rules:
    - host: taskflow.local # The hostname we'll fake via /etc/hosts
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway # Must match your Service's metadata.name
                port:
                  number: 4000
