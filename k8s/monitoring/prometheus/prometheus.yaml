# The scrape configuration — this is the heart of Prometheus.
# Changing this ConfigMap and restarting the pod is all you need
# to add or remove scrape targets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.monitoring.svc.cluster.local:9093']

    rule_files:
      - /etc/prometheus/rules.yml

    scrape_configs:
      # Prometheus scraping itself — useful for monitoring the monitor
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter.monitoring.svc.cluster.local:9100']

      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres-exporter.monitoring.svc.cluster.local:9187']

      - job_name: 'redis-exporter'
        static_configs:
          - targets: ['redis-exporter.monitoring.svc.cluster.local:9121']

      - job_name: 'kubelet'
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Your three NestJS services
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway.taskflow-dev.svc.cluster.local:4000']

      - job_name: 'task-service'
        static_configs:
          - targets: ['task-service.taskflow-dev.svc.cluster.local:4001']

      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service.taskflow-dev.svc.cluster.local:4002']

  rules.yml: |
    groups:
      # ── Infrastructure Alerts ──────────────────────────────────────
      - name: infrastructure
        rules:
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace=~"taskflow-dev|monitoring"}[10m]) > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last 10 minutes."

          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace=~"taskflow-dev|monitoring"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} was OOMKilled"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} was killed due to out of memory."

          - alert: NodeMemoryPressure
            expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 15
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node memory critically low"
              description: "Node has only {{ $value | printf \"%.1f\" }}% memory available."

          - alert: NodeMemoryWarning
            expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 25
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node memory running low"
              description: "Node has only {{ $value | printf \"%.1f\" }}% memory available."

          - alert: PersistentVolumeAlmostFull
            expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PersistentVolume {{ $labels.persistentvolumeclaim }} almost full"
              description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | printf \"%.1f\" }}% full."

      # ── Application Alerts ─────────────────────────────────────────
      - name: application
        rules:
          - alert: ServiceDown
            expr: up{job=~"api-gateway|task-service|user-service"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "Service {{ $labels.job }} has been unreachable for more than 1 minute."

          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
              /
              sum(rate(http_requests_total[5m])) by (job)
              * 100 > 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "{{ $labels.job }} has {{ $value | printf \"%.1f\" }}% error rate over the last 5 minutes."

          - alert: HighLatency
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (job, le)
              ) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High P99 latency on {{ $labels.job }}"
              description: "{{ $labels.job }} P99 latency is {{ $value | printf \"%.2f\" }}s over the last 5 minutes."

      # ── PostgreSQL Alerts ──────────────────────────────────────────
      - name: postgresql
        rules:
          - alert: PostgreSQLDown
            expr: pg_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"
              description: "PostgreSQL has been unreachable for more than 1 minute."

          - alert: PostgreSQLHighConnections
            expr: sum(pg_stat_activity_count) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL high connection count"
              description: "PostgreSQL has {{ $value }} active connections."

          - alert: PostgreSQLDeadlocks
            expr: rate(pg_stat_database_deadlocks[5m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL deadlocks detected"
              description: "PostgreSQL is experiencing {{ $value | printf \"%.2f\" }} deadlocks/s."

          - alert: PostgreSQLLowCacheHitRatio
            expr: |
              sum(pg_stat_database_blks_hit)
              / (sum(pg_stat_database_blks_hit) + sum(pg_stat_database_blks_read))
              * 100 < 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL cache hit ratio low"
              description: "PostgreSQL cache hit ratio is {{ $value | printf \"%.1f\" }}%, below 90% threshold."

      # ── Redis Alerts ───────────────────────────────────────────────
      - name: redis
        rules:
          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis is down"
              description: "Redis has been unreachable for more than 1 minute."

          - alert: RedisHighMemory
            expr: |
              redis_memory_max_bytes > 0
              and
              redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Redis memory usage high"
              description: "Redis is using {{ $value | printf \"%.1f\" }}% of max memory."

          - alert: RedisLowHitRate
            expr: |
              redis_keyspace_hits_total
              / (redis_keyspace_hits_total + redis_keyspace_misses_total)
              * 100 < 50
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Redis cache hit rate low"
              description: "Redis hit rate is {{ $value | printf \"%.1f\" }}%, below 50% threshold."
---
# The Prometheus Deployment — one replica is fine for a dev environment.
# In production you'd run Prometheus with persistent storage and possibly
# high-availability replicas, but for learning purposes this is perfect.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            # Tell Prometheus exactly where its config lives.
            # This is the flag that was missing from otel-lgtm's opaque setup.
            - '--config.file=/etc/prometheus/prometheus.yml'
            # How long to keep data — 15 days is plenty for dev
            - '--storage.tsdb.retention.time=15d'
            # Enable the web UI and API
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        # Mount the ConfigMap as a directory — Prometheus reads the whole
        # /etc/prometheus directory, so we don't need subPath here
        - name: config
          configMap:
            name: prometheus-config
        # EmptyDir is ephemeral storage that lives as long as the pod.
        # Data is lost on pod restart, which is fine for dev but not production.
        # In production environments you'd replace this with a PersistentVolumeClaim.
        - name: storage
          emptyDir: {}

---
# The Service — exposes Prometheus within the cluster so Grafana can query it
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: ['']
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['extensions']
    resources:
      - ingresses
    verbs: ['get', 'list', 'watch']
  - nonResourceURLs: ['/metrics']
    verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
