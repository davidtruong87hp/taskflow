# Single Grafana instance with all data sources pre-configured.
# Uses the grafana/otel-lgtm image which bundles Grafana, Loki,
# Tempo, and Prometheus in one container — perfect for local dev.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          # This all-in-one image from Grafana Labs bundles:
          # Grafana (UI), Tempo (traces), Loki (logs), Prometheus (metrics)
          # It's specifically designed for local development and demos.
          # Everything is pre-wired — no configuration needed.
          image: grafana/otel-lgtm:latest
          ports:
            - containerPort: 3000 # Grafana UI
            - containerPort: 4317 # OTLP gRPC — your services send here
            - containerPort: 4318 # OTLP HTTP
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: 'taskflow123'
            - name: GF_SECURITY_ADMIN_USER
              value: 'admin'
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '500m'

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: ui
      port: 3000
      targetPort: 3000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
