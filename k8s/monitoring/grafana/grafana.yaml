apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  # Grafana looks for datasource definitions in /etc/grafana/provisioning/datasources/
  # Any .yaml file in that directory gets automatically loaded at startup.
  # This is the "provisioning" approach — config as code rather than manual UI clicks.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      # Prometheus — for metrics (RED dashboard, resource usage, etc.)
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true   # This makes Prometheus the default datasource in Explore
        editable: false   # Prevent accidental changes through the UI

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3200
        editable: false

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: taskflow123
            # Disable the "change password" prompt on first login
            - name: GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION
              value: 'false'
            # Allow Grafana to be embedded in iframes (useful for dashboards)
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: 'false'
          volumeMounts:
            # Mount the datasources ConfigMap into the provisioning directory.
            # Grafana automatically scans this directory at startup.
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml # Mount just this file, not the whole ConfigMap
            - name: dashboard-red
              mountPath: /etc/grafana/provisioning/dashboards/red-dashboard.json
              subPath: red-dashboard.json
            # EmptyDir for Grafana's SQLite database (stores dashboards, users, etc.)
            # Same tradeoff as Prometheus storage — fine for dev, use PVC in production.
            - name: storage
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-red
          configMap:
            name: grafana-dashboard-red
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-standalone # Different name to avoid conflict with the otel-lgtm service
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
