apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack-webhook-url

    # Templates for Slack message formatting
    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      # Default receiver for all alerts
      receiver: slack-notifications
      # Group alerts by alertname and namespace to avoid alert storms
      group_by: ['alertname', 'namespace']
      # Wait 30s before sending first alert (allows grouping)
      group_wait: 30s
      # Wait 5m before sending new alerts for same group
      group_interval: 5m
      # Resend alert after 4h if still firing
      repeat_interval: 4h

      routes:
        # Critical alerts — shorter repeat interval
        - match:
            severity: critical
          receiver: slack-notifications
          repeat_interval: 1h

        # Warning alerts — longer repeat interval
        - match:
            severity: warning
          receiver: slack-notifications
          repeat_interval: 4h

    receivers:
      - name: slack-notifications
        slack_configs:
          - channel: '#alerts-critical'
            send_resolved: true
            icon_url: 'https://avatars3.githubusercontent.com/u/3380462'
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            color: '{{ template "slack.color" . }}'

    # Inhibition rules — suppress symptom alerts when root cause is firing
    inhibit_rules:
      # If a service is down, don't also alert on high error rate
      - source_match:
          alertname: ServiceDown
        target_match:
          alertname: HighErrorRate
        equal: ['namespace']
      # If node is under memory pressure, suppress pod OOM alerts
      - source_match:
          alertname: NodeMemoryPressure
        target_match:
          alertname: PodOOMKilled
        equal: ['node']

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-templates
  namespace: monitoring
data:
  slack.tmpl: |
    {{ define "slack.color" -}}
      {{ if eq .Status "firing" -}}
        {{ if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}
      {{- else }}good{{- end }}
    {{- end }}

    {{ define "slack.title" -}}
      {{ if eq .Status "firing" }}
        🔥 [{{ .CommonLabels.severity | toUpper }}] {{ .CommonLabels.alertname }}
      {{ else }}
        ✅ [RESOLVED] {{ .CommonLabels.alertname }}
      {{ end }}
    {{- end }}

    {{ define "slack.text" -}}
      {{ range .Alerts }}
        *Alert:* {{ .Annotations.summary }}
        *Description:* {{ .Annotations.description }}
        *Namespace:* {{ .Labels.namespace }}
        *Severity:* {{ .Labels.severity }}
        {{ if .Labels.pod }}*Pod:* {{ .Labels.pod }}{{ end }}
        *Since:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
      {{ end }}
    {{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.external-url=http://alertmanager.monitoring.svc.cluster.local:9093'
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: templates
              mountPath: /etc/alertmanager/templates
            - name: secrets
              mountPath: /etc/alertmanager/secrets
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: templates
          configMap:
            name: alertmanager-templates
        - name: secrets
          secret:
            secretName: alertmanager-secret
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
