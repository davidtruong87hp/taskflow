apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring # Ingress must live in the same namespace as its Service
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.taskflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana # Must match your Grafana Service name exactly
                port:
                  number: 3000
